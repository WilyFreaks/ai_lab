search = index=thousandeyes earliest=-7d \
| bin _time span=1m \
| stats avg(response_time_sec) by _time \
| apply CDTSM avg(response_time_sec) forecast_k=128 holdback=128 conf_interval=90\
| tail 128
description = Returns 128 future data points forecasting the average ThousandEyes response time (seconds) using the CDTSM (Cisco Dynamic Time Series Model) algorithm. Trained on the last 7 days of history with 90% confidence interval. Columns: _time, avg(response_time_sec) (actual), upper90(prediction(avg(response_time_sec))), lower90(prediction(avg(response_time_sec))). Index: thousandeyes. Use case examples: (1) predict expected response time behavior and identify anomalies by comparing actual vs predicted; (2) demonstrate ML-based time-series forecasting using CDTSM to workshop attendees; (3) compare CDTSM forecast accuracy against LLP5 (see forecast_predict).

