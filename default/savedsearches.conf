[Interface Counter Mismatch]
action.logevent = 1
action.logevent.param.event = alert_name="[$result.severity$] Interface Counter Mismatch​ from $result.router1$:$result.interface1$ to $result.router2$:$result.interface2$", severity=$result.severity$, diff_rate=$result.r1_to_r2_drop_rate$%, related_slice="$result.related_slice$", router1="$result.router1$", router2="$result.router2$",
detection_time = "$result._time$"
action.logevent.param.host = $result.path$
action.logevent.param.index = alerts
action.logevent.param.sourcetype = ai_lab_alert
action.webhook.enable_allowlist = 0
alert.digest_mode = 0
alert.suppress = 0
alert.track = 0
counttype = number of events
cron_schedule = */1 * * * *
dispatch.earliest_time = -60m@m
dispatch.latest_time = now
display.general.type = statistics
display.page.search.tab = statistics
display.visualizations.charting.axisTitleX.visibility = collapsed
display.visualizations.charting.axisTitleY.visibility = collapsed
display.visualizations.charting.axisTitleY2.visibility = collapsed
display.visualizations.charting.chart = line
display.visualizations.charting.legend.placement = none
display.visualizations.show = 0
display.visualizations.trellis.enabled = 1
display.visualizations.trellis.size = small
enableSched = 1
quantity = 0
relation = greater than
request.ui_dispatch_app = ai_lab
request.ui_dispatch_view = search
search = | union \
    [ search index=telemetry sourcetype=cnc_interface_counter_json _index_earliest=-2m@m _index_latest=-1m@m \
    | spath path=devices{} output=device \
    | fields - _raw \
    | mvexpand device \
    | spath input=device path=host_name output=host_name \
    | spath input=device path=uuid output=uuid \
    | rex field=device max_match=0 "\"(?<if_name>(?:HundredGigE|Bundle-Ether)[^\"]+)\"" \
    | mvexpand if_name \
    | eval ifInPktsRate = json_extract(device, "interfaces." . if_name . ".ifInPktsRate.latest_data.value") \
    | eval ifOutPktsRate = json_extract(device, "interfaces." . if_name . ".ifOutPktsRate.latest_data.value") \
    | eval timestamp = json_extract(device, "interfaces." . if_name . ".ifInPktsRate.latest_data.timestamp") \
    | rename host_name as router1_name, if_name as interface1 \
    | table _time router1_name interface1 ifInPktsRate ifOutPktsRate \
    | bin span=1m _time \
    | stats avg(ifInPktsRate) as ifInPktsRate1 avg(ifOutPktsRate) as ifOutPktsRate1 by _time router1_name interface1 \
    | lookup router_if_connections_bidirectional.csv router1_name interface1 \
    | where isnotnull(interface2) ] \
    [ search index=telemetry sourcetype=cnc_interface_counter_json _index_earliest=-2m@m _index_latest=-1m@m\
    | spath path=devices{} output=device \
    | fields - _raw \
    | mvexpand device \
    | spath input=device path=host_name output=host_name \
    | spath input=device path=uuid output=uuid \
    | rex field=device max_match=0 "\"(?<if_name>(?:HundredGigE|Bundle-Ether)[^\"]+)\"" \
    | mvexpand if_name \
    | eval ifInPktsRate = json_extract(device, "interfaces." . if_name . ".ifInPktsRate.latest_data.value") \
    | eval ifOutPktsRate = json_extract(device, "interfaces." . if_name . ".ifOutPktsRate.latest_data.value") \
    | eval timestamp = json_extract(device, "interfaces." . if_name . ".ifInPktsRate.latest_data.timestamp") \
    | rename host_name as router2_name, if_name as interface2 \
    | table _time router2_name interface2 ifInPktsRate ifOutPktsRate \
    | bin span=1m _time \
    | stats avg(ifInPktsRate) as ifInPktsRate2 avg(ifOutPktsRate) as ifOutPktsRate2 by _time router2_name interface2 \
    | lookup router_if_connections_bidirectional.csv router2_name interface2 ] \
| stats values(*) as * by _time router1 router1_name interface1 router2 router2_name interface2\
| eval r1_to_r2_gap = round(ifOutPktsRate1 - ifInPktsRate2, 6)\
| eval r2_to_r1_gap = round(ifOutPktsRate2 - ifInPktsRate1, 6)\
| eval r1_to_r2_drop_rate = round(r1_to_r2_gap / ifOutPktsRate1 * 100, 2)\
| eval r2_to_r1_drop_rate = round(r2_to_r1_gap / ifOutPktsRate2 * 100, 2)\
| eval severity = case(r1_to_r2_drop_rate>=10, "Critical", r1_to_r2_drop_rate>=5, "Warning", r1_to_r2_drop_rate>0,"Info", true(), "Normal") \
| search severity IN (Critical Warning)\
| join type=left router1_name router2_name \
    [ search index=telemetry sourcetype=cnc_srte_path_json earliest=-1d@d \
    | fields _time host sr_policy_results{}.hops{} \
    | rename sr_policy_results{}.hops{} as hops \
    | eval router1 = mvindex(hops, 0), router2 = mvindex(hops, 1) \
    | appendpipe \
        [ eval router1 = mvindex(hops, 1), router2 = mvindex(hops, 2) ] \
    | appendpipe \
        [ eval router1 = mvindex(hops, 2), router2 = mvindex(hops, 3) ] \
    | appendpipe \
        [ eval router1 = mvindex(hops, 3), router2 = mvindex(hops, 4) ] \
    | appendpipe \
        [ eval router1_tmp = router2, router2 = router1, router1 = router1_tmp ] \
    | eval slice = substr(host, 9, 4) \
    | stats values(slice) as related_slice by router1 router2 \
    | rename router1 as router1_name, router2 as router2_name \
    | eval related_slice = mvjoin(related_slice, ",")]\
| eval path=router1.":".interface1."_".router2.":".interface2

