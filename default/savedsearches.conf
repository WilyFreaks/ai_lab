[twamp_dmean_test]
action.email.useNSSubject = 1
action.webhook.enable_allowlist = 0
alert.track = 0
dispatch.earliest_time = 0
dispatch.latest_time = now
display.general.type = statistics
display.page.search.tab = statistics
display.visualizations.show = 0
request.ui_dispatch_app = ai_lab
request.ui_dispatch_view = search
search = index=twamp sourcetype=pca_twamp_csv earliest=-5m latest=now\
| fields _time ul_dmean* dl_dmean* rt_dmean*\
| untable _time metric value\
| eval direction=case(match(metric, "^ul_dmean"), "ul", match(metric, "^dl_dmean"), "dl", match(metric, "^rt_dmean"), "rt", null())\
| where isnotnull(direction) AND isnum(value)\
| stats avg(value) as avg_dmean by direction

