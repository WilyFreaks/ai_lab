search = index=twamp sourcetype="pca_twamp_csv"  _index_earliest=-2m@m _index_latest=-1m@m\
| rename "Session Name" as session_name\
| stats avg(dl_lostperc) as dl_lostperc avg(ul_lostperc) as ul_lostperc first(_time) as _time by session_name\
| rex field=session_name "Slice(?<slice>\d+)"\
| eval total_lostperc = (ul_lostperc + dl_lostperc)\
| eval severity = case(total_lostperc>10, "Critical", total_lostperc>=5, "Warning", true(), "Info")\
| where total_lostperc>0
description = Scheduled alert (runs every minute). Fires when TWAMP combined uplink+downlink packet loss exceeds 0% on any slice session. Severity: Critical (total_lostperc > 10%), Warning (>= 5%), Info (> 0%). Writes one event per affected session to index=alerts, sourcetype=ai_lab_alert. Alert event fields: alert_name, severity, slice (VLAN number), session_name, total_lostperc, ul_lostperc, dl_lostperc, detection_time, message. Source data: index=twamp, sourcetype=pca_twamp_csv (last 2 min window). Use case examples: (1) determine when packet loss first appeared and on which slice session; (2) correlate loss alert timing and severity with interface counter mismatch alerts and CNC service health degradation; (3) check whether uplink or downlink loss dominates to narrow fault direction.

