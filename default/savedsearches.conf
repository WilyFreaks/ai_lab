request.ui_dispatch_app = ai_lab
request.ui_dispatch_view = search
search = index=telemetry sourcetype=cnc_interface_counter_json \
| spath path=devices{} output=device \
| fields - _raw \
| mvexpand device \
| spath input=device path=host_name output=host_name \
| spath input=device path=uuid output=uuid \
| rex field=device max_match=0 "\"(?<if_name>(?:HundredGigE|Bundle-Ether)[^\"]+)\"" \
| mvexpand if_name \
| search if_name!="Bundle-Ether145" \
| lookup router_if_connections_bidirectional.csv router1_name as host_name interface1 as if_name \
| eval ifInPktsRate = json_extract(device, "interfaces." . if_name . ".ifInPktsRate.latest_data.value") \
| eval ifOutPktsRate = json_extract(device, "interfaces." . if_name . ".ifOutPktsRate.latest_data.value") \
| eval timestamp = json_extract(device, "interfaces." . if_name . ".ifInPktsRate.latest_data.timestamp") \
| eval if_name = host_name.":".router1."_".if_name \
| bin _time span=1m \
| chart avg(ifInPktsRate) by _time if_name limit=0 \
| predict algorithm=LLP5 holdback=128 future_timespan=128 period=1440 lower95=lower_bound upper95=upper_bound \
    [ search index=telemetry sourcetype=cnc_interface_counter_json earliest=-5m@m latest=now \
    | spath path=devices{} output=device \
    | fields - _raw \
    | mvexpand device \
    | spath input=device path=host_name output=host_name \
    | spath input=device path=uuid output=uuid \
    | rex field=device max_match=0 "\"(?<if_name>(?:HundredGigE|Bundle-Ether)[^\"]+)\"" \
    | mvexpand if_name \
    | search if_name!="Bundle-Ether145" \
    | lookup router_if_connections_bidirectional.csv router1_name as host_name interface1 as if_name \
    | eval ifInPktsRate = json_extract(device, "interfaces." . if_name . ".ifInPktsRate.latest_data.value") \
    | eval ifOutPktsRate = json_extract(device, "interfaces." . if_name . ".ifOutPktsRate.latest_data.value") \
    | eval timestamp = json_extract(device, "interfaces." . if_name . ".ifInPktsRate.latest_data.timestamp") \
    | eval if_name = host_name.":".router1."_".if_name \
    | stats values(if_name) as if_name \
    | eval fields = mvjoin(if_name, ",") \
    | return $if_name ] \
| tail 60 \
| rename lower_bound(prediction(*)) as *@lower_bound, upper_bound(prediction(*)) as *@upper_bound, prediction(*) as *@prediction \
| fields _time * \
| untable _time feature value \
| rex field=feature "^(?<if_name>[^@]+).*"\
| eval {feature}_value = value\
| chart avg(*_value) by _time if_name limit=0
description = Returns LLP5 algorithm forecasts for per-interface in-packet rate (pps) across all router interfaces. Uses the last 2 weeks of telemetry data. Results include actual historical values alongside prediction, lower_bound (lower95), and upper_bound (upper95) per interface, then untabled so each row has: _time, if_name (router:router_interface identifier), and columns like if_name_value, if_name@prediction_value, if_name@lower_bound_value, if_name@upper_bound_value. Only the last 60 data points (actual + forecast) are returned. Index: telemetry, sourcetype: cnc_interface_counter_json. Use case examples: (1) predict expected traffic per interface and identify which one deviates from normal; (2) detect anomalous traffic shifts across multiple interfaces simultaneously; (3) compare predicted vs actual traffic after a reroute to quantify the volume shift.

