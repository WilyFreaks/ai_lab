search = | union \
    [ search index=syslog sourcetype=wdm_pm SUMOOPCUR \
    | bin _time span=15m \
    | eval transponder_a = "MD=".'MD Name'.";ME=".'ME Name'.";PTP=".'PTP Name' \
    | stats avg(Value) as SUMOOPCUR by _time transponder_a \
    | lookup router_wdm_transponders_bidirectional.csv transponder_a_wdm as transponder_a OUTPUT router_a interface_a router_z interface_z \
    | eval router_interface_a = router_a.":".interface_a ] \
    [ search index=syslog sourcetype=wdm_pm SUMIOPCUR \
    | bin _time span=15m \
    | eval transponder_z = "MD=".'MD Name'.";ME=".'ME Name'.";PTP=".'PTP Name' \
    | stats avg(Value) as SUMIOPCUR by _time transponder_z \
    | lookup router_wdm_transponders_bidirectional.csv transponder_z_wdm as transponder_z OUTPUT router_a interface_a router_z interface_z \
    | eval router_interface_z = router_z.":".interface_z ]\
| stats values(*) as * by _time router_a interface_a router_z interface_z\
| eval lost_opcur = SUMOOPCUR - SUMIOPCUR\
| fields _time router_a interface_a transponder_a router_z interface_z transponder_z lost_opcur

