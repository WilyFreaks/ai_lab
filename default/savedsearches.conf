search = index=telemetry sourcetype=cnc_interface_counter_json \
| spath path=devices{} output=device \
| fields - _raw \
| mvexpand device \
| spath input=device path=host_name output=host_name \
| spath input=device path=uuid output=uuid \
| rex field=device max_match=0 "\"(?<if_name>(?:HundredGigE|Bundle-Ether)[^\"]+)\"" \
| mvexpand if_name \
| search if_name!="Bundle-Ether145"\
| lookup router_if_connections_bidirectional.csv router1_name as host_name interface1 as if_name\
| eval ifInPktsRate = json_extract(device, "interfaces." . if_name . ".ifInPktsRate.latest_data.value") \
| eval ifOutPktsRate = json_extract(device, "interfaces." . if_name . ".ifOutPktsRate.latest_data.value") \
| eval timestamp = json_extract(device, "interfaces." . if_name . ".ifInPktsRate.latest_data.timestamp") \
| eval if_name = host_name.":".router1."_".if_name\
| table _time if_name ifInPktsRate ifOutPktsRate\
| bin _time span=1m\
| chart avg(ifInPktsRate) by _time if_name limit=0
description = Returns a per-minute time-series chart of average in-packet rate (pps) for each router interface across all routers. Columns: _time, then one column per router:interface pair (e.g. R2-NCS5504:R2_HundredGigE0/0/0/0) with avg ifInPktsRate value. Only interfaces that appear in router_if_connections_bidirectional.csv are included (Bundle-Ether145 excluded). Index: telemetry, sourcetype: cnc_interface_counter_json. Use case examples: (1) chart in-packet rate trends for all interfaces to spot a traffic volume drop or spike; (2) compare before/after reroute traffic levels across the network; (3) identify which interface stopped receiving traffic during a fault.

