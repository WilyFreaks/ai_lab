search = index=telemetry sourcetype=cnc_service_health_json _index_earliest=-6m@m _index_latest=-1m@m \
| spath subservice_health{}\
| fields - _raw\
| mvexpand subservice_health{}\
| spath input=subservice_health{}\
| search health_score<100\
| table _time vpn_name category device health_status health_score\
| eval status=replace(health_status, "SERVICE_","")\
| rename health_score as score\
| table _time device vpn_name category status score\
| eval time=strftime(_time, "%Y/%m/%d %H:%M:%S")\
| rex field=device "(?<device>R[0-9]*)"\
| sort _time\
| rex field=vpn_name "Vlan(?<slice>[0-9]*)"\
| stats first(_time) as alert_time values(time) as alert_time_mv by vpn_name device category status score slice
description = Scheduled alert (runs every 5 minutes). Fires when any CNC sub-service health score drops below 100 (Critical only). Writes one event per degraded device/VPN/category combination to index=alerts, sourcetype=ai_lab_alert. Alert event fields: alert_name, severity (always Critical), vpn_name (e.g. NSS-5G_Slice_Vlan1001-internal), device (router name, e.g. R2), category (vrf_route_health, interface_health, sr_policy, pcep_session_health, bgp_nbr_health), status (health_status with SERVICE_ prefix stripped), score (health_score 0–99), slice (VLAN number), alert_time, alert_time_mv (multi-value list of all detection times within the window). Source data: index=telemetry, sourcetype=cnc_service_health_json (6-min window ending 1 min ago). Use case examples: (1) identify which VPN/slice and which sub-service category (e.g. sr_policy) first became degraded; (2) correlate CNC health alert timing with packet loss and interface mismatch alerts to build a root-cause timeline; (3) confirm health alerts stop firing after scenario deactivation.

