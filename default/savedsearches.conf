| spath subservice_health{}\
| fields - _raw\
| mvexpand subservice_health{}\
| spath input=subservice_health{}\
| search health_score<100\
| table _time vpn_name category device health_status health_score\
| eval status=replace(health_status, "SERVICE_","")\
| rename health_score as score\
| table _time device vpn_name category status score\
| eval time=strftime(_time, "%Y/%m/%d %H:%M:%S")\
| rex field=device "(?<device>R[0-9]*)"\
| sort _time\
| rex field=vpn_name "Vlan(?<slice>[0-9]*)"\
| stats first(_time) as alert_time values(time) as alert_time_mv by vpn_name device category status score slice

