# Telemetry reroute policy (slice-based):
# - reroute_from_slice: slices whose packet rates are reduced
# - reroute_to_slice: slices whose packet rates are increased
# - reroute_pct: percent shift amount at full ramp
# - reroute_ramp_minutes: linear ramp to full reroute effect
# Keep directional conservation open so explicit gap effects are not clamped away.
telemetry#cnc_interface_counter_json#sample.json#directional_min_receive_fraction = 0
