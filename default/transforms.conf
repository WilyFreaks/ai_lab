[set_host_from_cnc_srte_path_json]
REGEX = \"vlan\"\s*:\s*\"([^\"]+)\"
FORMAT = host::$1
DEST_KEY = MetaData:Host

[set_host_from_cnc_service_health_json]
REGEX = \"vlan\"\s*:\s*\"([^\"]+)\"
FORMAT = host::$1
DEST_KEY = MetaData:Host

[set_host_from_cisco_ios]
# IOS sample lines start with: <timestamp> <host> <sequence> ...
REGEX = ^\S+\s+([A-Za-z0-9._-]+)\s+
FORMAT = host::$1
DEST_KEY = MetaData:Host

[set_host_from_wdm_alert_xml]
# Use NativeEMSName alias as event host (e.g. R7).
REGEX = <alias-name>NativeEMSName<\/alias-name>\s*<alias-value>([^<]+)<\/alias-value>
FORMAT = host::$1
DEST_KEY = MetaData:Host

[set_host_from_wdm_pm_me_name]
# wdm_pm CSV: ME Name is the 3rd column.
REGEX = ^(?:[^,]*,){2}([^,]+),
FORMAT = host::$1
DEST_KEY = MetaData:Host
