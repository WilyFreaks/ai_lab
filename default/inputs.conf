[script://./bin/launcher.py]
interval = -1
sourcetype = ai_lab:launcher
index     = ai_lab_log
disabled  = false

[script://./bin/spool_cleanup.py]
interval  = 3600
sourcetype = ai_lab:spool_cleanup
index     = ai_lab_log
disabled  = false

[monitor://$SPLUNK_HOME/etc/apps/ai_lab/var/spool/ai_lab/thousandeyes/cisco_thousandeyes_metric/]
disabled = false
index = thousandeyes
sourcetype = cisco:thousandeyes:metric
host = thousandeyes_at_r9
source = ai_lab:script:thousandeyes_metric
crcSalt = <SOURCE>
whitelist = \.json$
recursive = true

[monitor://$SPLUNK_HOME/etc/apps/ai_lab/var/spool/ai_lab/thousandeyes/cisco_thousandeyes_alerts/]
disabled = false
index = thousandeyes
sourcetype = cisco:thousandeyes:alerts
host = thousandeyes_at_r9
source = ai_lab:script:thousandeyes_alerts
crcSalt = <SOURCE>
whitelist = \.json$
recursive = true

