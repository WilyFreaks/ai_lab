[script://./bin/launcher.py]
interval = -1
sourcetype = ai_lab:launcher
index     = main
disabled  = false

[monitor://$SPLUNK_HOME/etc/apps/ai_lab/var/spool/ai_lab/thousandeyes/cisco_thousandeyes_metric/]
disabled = false
index = thousandeyes
sourcetype = cisco:thousandeyes:metric
whitelist = \.json$
recursive = true

[monitor://$SPLUNK_HOME/etc/apps/ai_lab/var/spool/ai_lab/thousandeyes/cisco_thousandeyes_alerts/]
disabled = false
index = thousandeyes
sourcetype = cisco:thousandeyes:alerts
whitelist = \.json$
recursive = true

[monitor://$SPLUNK_HOME/etc/apps/ai_lab/var/spool/ai_lab/telemetry/cnc_interface_counter_json/]
disabled = false
index = telemetry
sourcetype = cnc_interface_counter_json
whitelist = \.json$
recursive = true
